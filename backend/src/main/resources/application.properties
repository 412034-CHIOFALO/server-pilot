server.port=8090
spring.security.user.name=${SP_USER:admin}
spring.security.user.password=${SP_PASS:changeme}
sp.ssh.host=${SP_SSH_HOST:host.docker.internal}
sp.ssh.port=${SP_SSH_PORT:22}
sp.ssh.username=${SP_SSH_USER:ubuntu}
sp.ssh.privateKeyPath=${SP_SSH_KEY:/root/.ssh/id_rsa}
sp.data.path=${SP_DATA:/data}
sp.host=${SP_HOST:localhost}
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.access=read_only
sp.security.maxAttempts=5
sp.security.lockMinutes=15
server.forward-headers-strategy=framework
