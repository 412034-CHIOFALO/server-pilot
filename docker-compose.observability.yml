services:
  prometheus:
    image: prom/prometheus:latest
    container_name: server-pilot-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    environment:
      - SP_USER=${SP_USER:-admin}
      - SP_PASS=${SP_PASS:-changeme}
    networks:
      - server-pilot_default
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: server-pilot-grafana
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./observability/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${SP_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${SP_PASS:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - server-pilot_default
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  server-pilot_default:
    external: true

volumes:
  prometheus-data:
  grafana-data:
